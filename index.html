/* ─── SLIDER ─────────────────────────────────────────────────── */
function Slider({ value, min, max, step=1, onChange, color=”#0E7C6E” }) {
const pct = max === min ? 0 : ((value - min) / (max - min)) * 100;
return (
<input type=“range” value={value} min={min} max={max} step={step} onChange={e => onChange(+e.target.value)}
style={{ background:`linear-gradient(to right,${color} 0%,${color} ${pct}%,rgba(255,255,255,.1) ${pct}%,rgba(255,255,255,.1) 100%)` }}
/>
);
}

setPct(m.pctDef);

            <div style={{ background:"#0A1628", border:"1px solid rgba(255,255,255,.07)", borderRadius:12, padding:"22px 24px" }}>
              <div style={{ fontFamily:"'IBM Plex Mono'", fontSize:11, color:"#4A7C74", letterSpacing:".1em", textTransform:"uppercase", marginBottom:16 }}>01 — Engagement Model</div>
              <div className="model-grid" style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:8 }}>
                {MODELS.map(mod=>(
                  <ModelCard key={mod.id} m={mod} active={model===mod.id} onClick={()=>setModel(mod.id)}/>
                ))}
              </div>
            </div>

            {/* 02 Duration (months 1–12) — not for project/exec */}
            {(model === "full" || model === "selective") && (
              <div style={{ background:"#0A1628", border:"1px solid rgba(255,255,255,.07)", borderRadius:12, padding:"22px 24px" }}>
                <div style={{ fontFamily:"'IBM Plex Mono'", fontSize:11, color:"#4A7C74", letterSpacing:".1em", textTransform:"uppercase", marginBottom:16 }}>
                  02 — Engagement Duration
                </div>
                {/* Month picker */}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:6, marginBottom:6 }}>
                  {MONTHS_LABELS.map((lbl,i)=>{
                    const mo = i+1;
                    const sel = months === mo;
                    return (
                      <button key={mo} onClick={()=>setMonths(mo)}
                        style={{ padding:"9px 4px", borderRadius:6, border:`1.5px solid ${sel ? m.color : "rgba(255,255,255,.08)"}`,
                          background: sel ? `${m.color}22` : "rgba(255,255,255,.03)",
                          color: sel ? m.color : "#64748B", fontSize:12, fontWeight:600,
                          cursor:"pointer", fontFamily:"'IBM Plex Mono'", transition:"all .15s" }}>
                        {lbl}
                      </button>
                    );
                  })}
                </div>
                <div style={{ fontSize:11, color:"#334155", fontFamily:"'IBM Plex Mono'", marginTop:6 }}>
                  Selected: <span style={{ color:m.color }}>{months} {months===1?"month":"months"}</span>
                  {months >= 12 && <span style={{ color:"#2DD4BF", marginLeft:10 }}>✓ Best value</span>}
                  {months <= 3 && <span style={{ color:"#F59E0B", marginLeft:10 }}>Short engagement — Project RPO may be better suited</span>}
                </div>
              </div>
            )}

            {/* 03 Volume */}
            <div style={{ background:"#0A1628", border:"1px solid rgba(255,255,255,.07)", borderRadius:12, padding:"22px 24px" }}>
              <div style={{ fontFamily:"'IBM Plex Mono'", fontSize:11, color:"#4A7C74", letterSpacing:".1em", textTransform:"uppercase", marginBottom:20 }}>
                {model === "full" || model === "selective" ? "03" : "02"} — Hiring Volume
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24 }}>
                {model !== "project" && (
                  <div>
                    <label style={{ display:"block", fontSize:12, color:"#64748B", marginBottom:8 }}>
                      {model === "exec" ? "Number of Searches" : "Number of Hires"}
                    </label>
                    <input type="number" className="num-input" value={hires} min={1} max={model==="exec"?20:500}
                      onChange={e=>setHires(Math.max(1, parseInt(e.target.value)||1))}/>
                    <div style={{ marginTop:10 }}>
                      <Slider value={hires} min={1} max={model==="exec"?20:200} onChange={setHires} color={m.color}/>
                      <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#334155", fontFamily:"'IBM Plex Mono'", marginTop:3 }}>
                        <span>1</span><span>{model==="exec"?"20":"200"}</span>
                      </div>
                    </div>
                  </div>
                )}
                <div>
                  <label style={{ display:"block", fontSize:12, color:"#64748B", marginBottom:8 }}>
                    {model==="exec" ? "Avg. First-Year Base Salary" : "Average Salary per Hire"}
                  </label>
                  <input type="number" className="num-input" value={salary} step={5000} min={30000}
                    onChange={e=>setSalary(Math.max(30000, parseInt(e.target.value)||30000))}/>
                  <div style={{ marginTop:10 }}>
                    <Slider value={salary} min={30000} max={250000} step={5000} onChange={setSalary} color={m.color}/>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#334155", fontFamily:"'IBM Plex Mono'", marginTop:3 }}>
                      <span>$30K</span><span>$250K</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* 04 Fees */}
            <div style={{ background:"#0A1628", border:"1px solid rgba(255,255,255,.07)", borderRadius:12, padding:"22px 24px" }}>
              <div style={{ fontFamily:"'IBM Plex Mono'", fontSize:11, color:"#4A7C74", letterSpacing:".1em", textTransform:"uppercase", marginBottom:20 }}>
                {model === "full" || model === "selective" ? "04" : "03"} — Fee Structure
              </div>

              {model === "project" && (
                <div>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                    <label style={{ fontSize:12, color:"#64748B" }}>Fixed Project Fee</label>
                    <span style={{ fontFamily:"'IBM Plex Mono'", fontSize:14, color:m.color, fontWeight:600 }}>{fmt(mgmt)}</span>
                  </div>
                  <Slider value={mgmt} min={25000} max={150000} step={5000} onChange={setMgmt} color={m.color}/>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#334155", fontFamily:"'IBM Plex Mono'", marginTop:4 }}>
                    <span>$25K</span><span>$150K</span>
                  </div>
                  <p style={{ fontSize:11, color:"#475569", marginTop:12, lineHeight:1.6 }}>All-inclusive fixed fee covering the full sourcing, screening and selection cycle for the defined project scope.</p>
                </div>
              )}

              {(model === "full" || model === "selective") && (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24 }}>
                  <div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                      <label style={{ fontSize:12, color:"#64748B" }}>Monthly Mgmt Fee</label>
                      <span style={{ fontFamily:"'IBM Plex Mono'", fontSize:13, color:m.color, fontWeight:600 }}>{fmt(mgmt)}</span>
                    </div>
                    <Slider value={mgmt} min={m.mgmtMin} max={m.mgmtMax} step={500} onChange={setMgmt} color={m.color}/>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#334155", fontFamily:"'IBM Plex Mono'", marginTop:4 }}>
                      <span>{fmt(m.mgmtMin)}</span><span>{fmt(m.mgmtMax)}</span>
                    </div>
                  </div>
                  <div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                      <label style={{ fontSize:12, color:"#64748B" }}>Per-Hire Fee</label>
                      <span style={{ fontFamily:"'IBM Plex Mono'", fontSize:13, color:m.color, fontWeight:600 }}>{pct}%</span>
                    </div>
                    <Slider value={pct} min={m.pctMin} max={m.pctMax} step={0.5} onChange={setPct} color={m.color}/>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#334155", fontFamily:"'IBM Plex Mono'", marginTop:4 }}>
                      <span>{m.pctMin}%</span><span>{m.pctMax}%</span>
                    </div>
                  </div>
                </div>
              )}

              {model === "exec" && (
                <div>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                    <label style={{ fontSize:12, color:"#64748B" }}>Retained Search Fee</label>
                    <span style={{ fontFamily:"'IBM Plex Mono'", fontSize:13, color:m.color, fontWeight:600 }}>{pct}% of first-year base</span>
                  </div>
                  <Slider value={pct} min={20} max={25} step={0.5} onChange={setPct} color={m.color}/>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#334155", fontFamily:"'IBM Plex Mono'", marginTop:4 }}>
                    <span>20%</span><span>25%</span>
                  </div>
                  <div style={{ marginTop:16, padding:"12px 14px", background:"rgba(255,255,255,.03)", borderRadius:8, border:"1px solid rgba(255,255,255,.06)" }}>
                    <div style={{ fontFamily:"'IBM Plex Mono'", fontSize:10, color:"#475569", letterSpacing:".08em", marginBottom:10 }}>PAYMENT SCHEDULE — PER SEARCH</div>
                    {[["At Engagement","1/3 upfront"],["At Shortlist","1/3 on shortlist"],["At Placement","1/3 on start"]].map(([lbl,sub])=>(
                      <div key={lbl} style={{ display:"flex", justifyContent:"space-between", marginBottom:7 }}>
                        <div>
                          <div style={{ fontSize:12, color:"#94A3B8" }}>{lbl}</div>
                          <div style={{ fontSize:10, color:"#475569" }}>{sub}</div>
                        </div>
                        <span style={{ fontFamily:"'IBM Plex Mono'", fontSize:13, color:"#E2E8F0" }}>{fmt(perHireAmt/3)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* ── RIGHT SUMMARY ── */}
          <div>
            <div style={{ background:"#0A1628", border:`1px solid ${m.color}45`, borderRadius:12, overflow:"hidden", position:"sticky", top:84 }}>

              {/* Summary header */}
              <div style={{ background:`linear-gradient(135deg,${m.color}30,${m.color}0D)`, padding:"18px 22px", borderBottom:`1px solid ${m.color}25` }}>
                <div style={{ fontFamily:"'IBM Plex Mono'", fontSize:10, color:m.color, letterSpacing:".12em", textTransform:"uppercase", marginBottom:5 }}>Cost Estimate</div>
                <div style={{ fontFamily:"'Syne',sans-serif", fontSize:14, color:"#94A3B8" }}>{m.label} · {m.desc}</div>
              </div>

              {/* Line items */}
              <div style={{ padding:"20px 22px" }}>
                {(model === "full" || model === "selective") && (<>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 0", borderBottom:"1px solid rgba(255,255,255,.05)" }}>
                    <div>
                      <div style={{ fontSize:12, color:"#94A3B8" }}>Management Fee</div>
                      <div style={{ fontSize:11, color:"#475569", fontFamily:"'IBM Plex Mono'", marginTop:2 }}>{fmt(mgmt)}/mo × {months} {months===1?"month":"months"}</div>
                    </div>
                    <div style={{ fontFamily:"'IBM Plex Mono'", fontSize:15, color:"#E2E8F0", fontWeight:600 }}>{fmt(totalMgmt)}</div>
                  </div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 0", borderBottom:"1px solid rgba(255,255,255,.05)" }}>
                    <div>
                      <div style={{ fontSize:12, color:"#94A3B8" }}>Placement Fees</div>
                      <div style={{ fontSize:11, color:"#475569", fontFamily:"'IBM Plex Mono'", marginTop:2 }}>{hires} hires × {fmt(perHireAmt)} ({pct}%)</div>
                    </div>
                    <div style={{ fontFamily:"'IBM Plex Mono'", fontSize:15, color:"#E2E8F0", fontWeight:600 }}>{fmt(totalPlace)}</div>
                  </div>
                </>)}

                {model === "project" && (
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 0", borderBottom:"1px solid rgba(255,255,255,.05)" }}>
                    <div>
                      <div style={{ fontSize:12, color:"#94A3B8" }}>Fixed Project Fee</div>
                      <div style={{ fontSize:11, color:"#475569", marginTop:2 }}>All-inclusive engagement</div>
                    </div>
                    <div style={{ fontFamily:"'IBM Plex Mono'", fontSize:15, color:"#E2E8F0", fontWeight:600 }}>{fmt(mgmt)}</div>
                  </div>
                )}

                {model === "exec" && (
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 0", borderBottom:"1px solid rgba(255,255,255,.05)" }}>
                    <div>
                      <div style={{ fontSize:12, color:"#94A3B8" }}>Retained Search Fees</div>
                      <div style={{ fontSize:11, color:"#475569", fontFamily:"'IBM Plex Mono'", marginTop:2 }}>{hires} {hires===1?"search":"searches"} × {fmt(perHireAmt)} ({pct}%)</div>
                    </div>
                    <div style={{ fontFamily:"'IBM Plex Mono'", fontSize:15, color:"#E2E8F0", fontWeight:600 }}>{fmt(totalPlace)}</div>
                  </div>
                )}

                {/* Total */}
                <div style={{ padding:"16px 0 4px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                    <div style={{ fontFamily:"'Syne',sans-serif", fontSize:13, fontWeight:700, color:"#94A3B8", textTransform:"uppercase", letterSpacing:".05em" }}>Total Estimate</div>
                    <div style={{ fontFamily:"'IBM Plex Mono'", fontSize:24, fontWeight:600, color:m.color }}>{fmt(total)}</div>
                  </div>
                  {(model === "full" || model === "selective") && (
                    <div style={{ textAlign:"right", fontSize:11, color:"#334155", fontFamily:"'IBM Plex Mono'" }}>
                      {fmt(total/hires)} per hire · {fmt(total/months)}/mo effective
                    </div>
                  )}
                </div>
              </div>

              {/* Agency comparison */}
              {(model === "full" || model === "selective") && (
                <div style={{ margin:"0 22px 20px", padding:"14px 16px", background:"rgba(255,255,255,.03)", borderRadius:8, border:"1px solid rgba(255,255,255,.06)" }}>
                  <div style={{ fontFamily:"'IBM Plex Mono'", fontSize:10, color:"#475569", letterSpacing:".1em", textTransform:"uppercase", marginBottom:12 }}>vs. Agency Model (22% avg.)</div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <span style={{ fontSize:12, color:"#64748B" }}>Typical agency cost</span>
                    <span style={{ fontFamily:"'IBM Plex Mono'", fontSize:13, color:"#64748B", textDecoration:"line-through" }}>{fmt(agencyCost)}</span>
                  </div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span style={{ fontSize:12, color: saving>0 ? "#2DD4BF" : "#F87171" }}>
                      {saving>0 ? "▼ Estimated saving" : "▲ Additional cost"}
                    </span>
                    <span style={{ fontFamily:"'IBM Plex Mono'", fontSize:16, fontWeight:600, color: saving>0 ? "#2DD4BF" : "#F87171" }}>
                      {saving>0?"":"-"}{fmt(Math.abs(saving))}
                    </span>
                  </div>
                  {saving > 0 && (
                    <div style={{ marginTop:8, fontSize:10, color:"#334155", fontFamily:"'IBM Plex Mono'" }}>
                      {Math.round((saving/agencyCost)*100)}% reduction vs. agency spend
                    </div>
                  )}
                </div>
              )}

              {/* Duration callout */}
              {(model === "full" || model === "selective") && months <= 3 && (
                <div style={{ margin:"0 22px 20px", padding:"12px 14px", background:"rgba(245,158,11,.08)", borderRadius:8, border:"1px solid rgba(245,158,11,.2)" }}>
                  <div style={{ fontSize:11, color:"#F59E0B", lineHeight:1.6 }}>
                    ⚠ Short engagements under 3 months may not allow enough time for the full Labor Intelligence Framework to compound. <strong>Project RPO</strong> may be better suited.
                  </div>
                </div>
              )}

              {/* Disclaimer */}
              <div style={{ padding:"0 22px 22px" }}>
                <div style={{ padding:"10px 14px", background:`${m.color}0D`, borderRadius:7, fontSize:11, color:"#64748B", lineHeight:1.65 }}>
                  ⓘ Indicative estimate based on LIF standard rate ranges. Final pricing is confirmed at proposal stage following a scoping call.
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    )}
  </div>

  {/* ── FOOTER ── */}
  <div style={{ borderTop:"1px solid rgba(255,255,255,.05)", marginTop:60, padding:"28px 32px", textAlign:"center" }}>
    <div style={{ fontFamily:"'Syne',sans-serif", fontSize:14, fontWeight:700, color:"#1E3A5F", letterSpacing:".05em" }}>INTELLIGENCE-LED RPO</div>
    <div style={{ fontSize:11, color:"#1E3A5F", marginTop:4 }}>Powered by the Labor Intelligence Framework · Confidential</div>
  </div>
</div>
```

);
}

const root = ReactDOM.createRoot(document.getElementById(“root”));
root.render(<App/>);
</script>
